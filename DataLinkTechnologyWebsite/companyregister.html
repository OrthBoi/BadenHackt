<!doctype html>
<html lang="en">
  
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DataLink Technology - Login</title>
  <link rel="icon" href="images/logo.png" type="image/png" />
  <link rel="stylesheet" href="common_styles.css" />
</head>
  <body>
    <div id="mainHomepageWrapping">
      <div id="homepageLogoAndTitle">
        <div id="homepageLogo">
          <a href="index.html">
            <img src="images/logo.png" alt="DataLink Technology Logo" />
          </a>
        </div>
        <div id="homepageTitle"><h1>DataLink Technology</h1></div>
      </div>

      <!-- Main Login Bereich -->
      <div id="mainLogin">
        <h2>Login als Unternehmen</h2>
        <div id="userLoginForm">
          <div>
            <label for="username">Nutzer:</label>
            <input type="text" id="username" name="username" />
          </div>
          <div>
            <label for="password">Passwort:</label>
            <input type="password" id="password" name="password" />
          </div>
          <div>
            <label for="email">E-Mail:</label>
            <input type="email" id="email" name="email" />
          </div>
          <div>
            <label for="companyName">Unternehmen:</label>
            <input type="text" id="companyName" name="companyName" />
          </div>
          <div id="buttonRegisterForm">
            <a href="companyregister.html">
              <button>Registrieren</button>
            </a>
          </div>
        </div>
      </div>
    </div>
  </body>
  <footer>
    <div id="footerWrapping">
      <div>
        <p>&copy; 2026 DataLink Technology. All rights reserved.</p>
      </div>
      <div>
        <p>
          Contact:
          <a href="mailto:info@datalink-technology.com"
            >info@datalink-technology.com</a
          >
        </p>
      </div>
    </div>
  </footer>
</html>
